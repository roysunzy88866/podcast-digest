# C7b 无人值守 · 全自动发布流水线(Scenario 3 · ADR 0011/0012 · drift #20/#21/#22)
# cron 一天一次(+手动)→ 取 RSS → 只向前看的新访谈集跑完整链 → gate-all 全过 → 部署 voice.solomind.cc → 去重状态 commit 回仓。
#
# 【全自动例外】发布无人工复核,靠 gate-all(五层机器闸门)+ 定点重写兜底(drift #20,用户知情风险自担)。
# 【安全】只有「真处理了新集 且 gate-all 全过」才 deploy;无新集/闸门不过 → 不碰线上(保上一版)。
#         当前 cutoff 之下无新集时,手动触发会干净退出、不部署 —— 可安全验骨架。
name: C7b Auto Pipeline

on:
  schedule:
    - cron: "0 2 * * *"   # 每天 UTC 02:00(北京 10:00)一次(drift #22)
  workflow_dispatch:        # 手动触发(验骨架 / 需要时手动补跑)
    inputs:
      backfill:
        description: "一次性回填最近 N 集(评估批,override 只向前看;留空/0=正常只向前看)"
        required: false
        default: "0"

permissions:
  contents: write           # 处理完把新集 data/ + pipeline-state.json commit 回仓(去重状态持久化)

concurrency:
  group: c7b-pipeline
  cancel-in-progress: false # 别打断正在发布的跑批

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: 装环境(ffmpeg + edge-tts + glm-ask + node deps)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          python3 -m pip install --user edge-tts
          echo "EDGE_TTS_BIN=$HOME/.local/bin/edge-tts" >> "$GITHUB_ENV"
          # 装 glm-ask 到 PATH:流水线脚本都调裸命令 glm-ask,runner 上没有 → 用仓库自带副本(key 走 ZHIPU_API_KEY env)
          mkdir -p "$HOME/.local/bin"
          cp tools/glm-ask "$HOME/.local/bin/glm-ask"
          chmod +x "$HOME/.local/bin/glm-ask"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          npm install --no-audit --no-fund

      - name: 跑编排器(取 RSS → 新集跑全链 → gate-all 全过才成)
        id: pipeline
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
        run: |
          # 手动触发可传 backfill=N 回填最近 N 集(评估批);cron/默认走正常「只向前看」
          BACKFILL="${{ github.event.inputs.backfill || '0' }}"
          # 非法输入(非数字)响亮报错,不静默降级为只向前看(GLM 20260720-004[1])
          if ! echo "$BACKFILL" | grep -qE '^[0-9]+$'; then
            echo "::error::backfill 输入非法(需非负整数):'$BACKFILL'"; exit 1
          fi
          if [ "$BACKFILL" -gt 0 ]; then
            echo "🔁 回填模式:最近 $BACKFILL 集"
            node scripts/run-pipeline.mjs --backfill "$BACKFILL"
          else
            node scripts/run-pipeline.mjs
          fi
          # 判定是否有**干净可发**的新内容:只看 data/episodes(新完成集)+ samples(新集页)——
          # 全被隔离时 data/episodes 无新增(失真集已移去 gitignore 的 data/skipped),samples 也无新增 → 不部署。
          # (不看 pipeline-state.json:它在"全 skip 只更新账本"时也会变,会误判有新)
          if [ -n "$(git status --porcelain data/episodes samples)" ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            echo "有干净新集,进部署"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            echo "无干净新集(无新/全隔离),跳过部署(线上保持上一版)"
          fi

      - name: 构建站点 + 部署 voice.solomind.cc(仅当有新集且闸门全过)
        if: steps.pipeline.outputs.has_new == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # account id 是标识符非机密(单独无用),直接写死省得多配一个 secret
          CLOUDFLARE_ACCOUNT_ID: ac6b3134d98758210ac27d37bd7d5a2d
        run: |
          set -e
          # 1) bootstrap Quartz v5(钉 commit)+ baseUrl 设 voice.solomind.cc
          QUARTZ_COMMIT=9cf87ff1c248a8ca551093214b0fec3b31415009
          [ -d site ] || git clone --branch v5 --single-branch https://github.com/jackyzha0/quartz.git site
          git -C site checkout "$QUARTZ_COMMIT"
          cd site
          npm i --no-audit --no-fund
          node ./quartz/bootstrap-cli.mjs create -X new -t default -l shortest -b "voice.solomind.cc"
          node ./quartz/bootstrap-cli.mjs plugin install --from-config --latest
          # 2) 灌内容(集页 + 实体页)+ 列表首页
          cp ../samples/*.md content/ 2>/dev/null || true
          if ls ../samples/entities/*.md >/dev/null 2>&1; then
            mkdir -p content/entities && cp ../samples/entities/*.md content/entities/
          fi
          node ../scripts/build-list.mjs
          node ./quartz/bootstrap-cli.mjs build
          # 3) 音频进 public/audio(C7a:随 Pages 静态,drift #18;当年手动 cp,此处脚本化)
          mkdir -p public/audio
          for f in ../data/episodes/*/audio.mp3; do
            id=$(basename "$(dirname "$f")")
            cp "$f" "public/audio/$id.mp3"
          done
          ls -la public/audio
          # 4) 部署(CF API token,非交互;项目 voice-solomind)
          npx wrangler pages deploy public --project-name voice-solomind --branch main

      - name: 去重状态 commit 回仓(始终:持久化 cutoff + skipped 账本,防下次重跑重扣钱)
        if: always()
        run: |
          git config user.name "c7b-bot"
          git config user.email "c7b-bot@users.noreply.github.com"
          # data/skipped 是 gitignore 的(不入公开仓);去重靠 pipeline-state.json 的 skipped 账本
          git add data/episodes data/pipeline-state.json samples 2>/dev/null || true
          git commit -m "[C7 🤖] C7b 自动跑批:推进 cutoff + skipped 账本(+干净集若有) (US-4, US-5)" || echo "无改动可提交"
          git push || echo "无改动或推送跳过"

      - name: 发布小结(写进 job summary)
        if: always()
        run: |
          {
            echo "## C7b 跑批结果"
            echo "- 有新集:\`${{ steps.pipeline.outputs.has_new }}\`"
            echo "- 有新集→已部署 voice.solomind.cc 并 commit 回仓;无新集→未碰线上。"
            echo "- 失败时 GitHub 会自动给仓库 owner 发邮件(原生告警)。"
          } >> "$GITHUB_STEP_SUMMARY"
