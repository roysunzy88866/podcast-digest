# C7b 无人值守 · 全自动发布流水线(Scenario 3 · ADR 0011/0012 · drift #20/#21/#22)
# cron 一天一次(+手动)→ 取 RSS → 只向前看的新访谈集跑完整链 → gate-all 全过 → 部署 voice.solomind.cc → 去重状态 commit 回仓。
#
# 【全自动例外】发布无人工复核,靠 gate-all(五层机器闸门)+ 定点重写兜底(drift #20,用户知情风险自担)。
# 【安全】只有「真处理了新集 且 gate-all 全过」才 deploy;无新集/闸门不过 → 不碰线上(保上一版)。
#         当前 cutoff 之下无新集时,手动触发会干净退出、不部署 —— 可安全验骨架。
name: C7b Auto Pipeline

on:
  schedule:
    - cron: "0 2 * * *"   # 每天 UTC 02:00(北京 10:00)一次(drift #22)
  workflow_dispatch:        # 手动触发(验骨架 / 需要时手动补跑)
    inputs:
      backfill:
        description: "一次性回填最近 N 集(评估批,override 只向前看;留空/0=正常只向前看)"
        required: false
        default: "0"
      deploy:
        description: "强制部署当前已发布集(即便本轮无新集)——用于把已提交的干净集重新上线"
        required: false
        default: "false"
      refresh:
        description: "存量翻新:按新叙事骨架重浓缩已完成集(all=全部,或逗号分隔集 id;过不了闸门自动回滚老版)"
        required: false
        default: ""
      source:
        description: "只跑指定源(如 a16z;多源下 backfill 必填,防笼统批量烧钱——C9)"
        required: false
        default: ""
      seed:
        description: "true=给缺基线的源设 cutoff(只补缺,绝不顶已有;配 source 可只 seed 一个源)——C10,本机 fetch 不走代理故 seed 放云端"
        required: false
        default: "false"

permissions:
  contents: write           # 处理完把新集 data/ + pipeline-state.json commit 回仓(去重状态持久化)

concurrency:
  group: c7b-pipeline
  cancel-in-progress: false # 别打断正在发布的跑批

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      # C9:whisperx 要 3.11(spike 同款);edge-tts 纯 python,跟着 3.11 也没事
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 装环境(ffmpeg + edge-tts + glm-ask + whisperX + node deps)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          python3 -m pip install --user edge-tts
          # C9 · a16z ASR 进料口:whisperX(CPU 版 torch 免 CUDA 大包)。每 run 都装(~3 分钟):
          # 装不装取决于本轮有没有 a16z 新集,但那要跑了编排器才知道 → 无条件装,公开仓 runner 分钟免费。
          pip install -q torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -q whisperx
          echo "EDGE_TTS_BIN=$HOME/.local/bin/edge-tts" >> "$GITHUB_ENV"
          # 装 glm-ask 到 PATH:流水线脚本都调裸命令 glm-ask,runner 上没有 → 用仓库自带副本(key 走 ZHIPU_API_KEY env)
          mkdir -p "$HOME/.local/bin"
          cp tools/glm-ask "$HOME/.local/bin/glm-ask"
          chmod +x "$HOME/.local/bin/glm-ask"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          npm install --no-audit --no-fund

      - name: 跑编排器(取 RSS → 新集跑全链 → gate-all 全过才成)
        id: pipeline
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}   # C9:whisperX pyannote 分离要(a16z ASR 路线)
        run: |
          # 手动触发可传 backfill=N 回填最近 N 集(评估批);cron/默认走正常「只向前看」
          BACKFILL="${{ github.event.inputs.backfill || '0' }}"
          REFRESH="${{ github.event.inputs.refresh || '' }}"
          SOURCE="${{ github.event.inputs.source || '' }}"
          # 非法输入(非数字)响亮报错,不静默降级为只向前看(GLM 20260720-004[1])
          if ! echo "$BACKFILL" | grep -qE '^[0-9]+$'; then
            echo "::error::backfill 输入非法(需非负整数):'$BACKFILL'"; exit 1
          fi
          # C9:source 只许简单 slug(照 backfill 校验先例);编排器还会核对 SOURCES 名单
          if [ -n "$SOURCE" ] && ! echo "$SOURCE" | grep -qE '^[a-z0-9]+$'; then
            echo "::error::source 输入非法(需小写字母数字 slug):'$SOURCE'"; exit 1
          fi
          SRC_ARGS=""
          [ -n "$SOURCE" ] && SRC_ARGS="--source $SOURCE"
          # C10:seed 模式(设基线不处理内容,不烧钱)。放云端因本机 Node fetch 不走代理、部分 feed 取不到。
          if [ "${{ github.event.inputs.seed || 'false' }}" = "true" ]; then
            echo "🌱 seed 模式:补缺基线 ${SOURCE:+(只 $SOURCE)}"
            node scripts/run-pipeline.mjs --seed $SRC_ARGS
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$REFRESH" ]; then
            # 输入防呆(照 backfill 数字校验先例;GLM 20260724-002[2]):只许 all 或集 id 逗号串
            if ! echo "$REFRESH" | grep -qE '^(all|[a-zA-Z0-9,_-]+)$'; then
              echo "::error::refresh 输入非法(需 all 或逗号分隔集 id):'$REFRESH'"; exit 1
            fi
            # 存量翻新(2026-07-24 用户拍板:云端真实流程做):重浓缩→闸门→败者回滚老版 → 统一重建+全库门
            echo "🔄 存量翻新模式:$REFRESH"
            if [ "$REFRESH" = "all" ]; then node scripts/refresh-digests.mjs; else node scripts/refresh-digests.mjs --ids "$REFRESH"; fi
            node scripts/run-pipeline.mjs --ensure-audio   # 回滚集在 runner 无音频,gate-audio 会挂(refresh 首跑 18 条实测)
            node scripts/build-entities.mjs
            node scripts/build-pages.mjs
            node scripts/build-list.mjs
            node scripts/build-feed.mjs --out feed.xml
            node scripts/gate-all.mjs
          elif [ "$BACKFILL" -gt 0 ]; then
            echo "🔁 回填模式:最近 $BACKFILL 集 ${SOURCE:+(源 $SOURCE)}"
            # 多源配置下编排器强制回填必须点名源(C9 防呆);不点名会响亮 exit 2
            node scripts/run-pipeline.mjs --backfill "$BACKFILL" $SRC_ARGS
          else
            node scripts/run-pipeline.mjs $SRC_ARGS
          fi
          # 判定是否有**干净可发**的新内容:只看 data/episodes(新完成集)+ samples(新集页)——
          # 全被隔离时 data/episodes 无新增(失真集已移去 gitignore 的 data/skipped),samples 也无新增 → 不部署。
          # (不看 pipeline-state.json:它在"全 skip 只更新账本"时也会变,会误判有新)
          if [ -n "$(git status --porcelain data/episodes samples)" ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            echo "有干净新集,进部署"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            echo "无干净新集(无新/全隔离),跳过部署(线上保持上一版)"
          fi

      - name: 产物兜底 artifact(无论成败:回仓再败也能手动捞,付费产物永不随 runner 销毁)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-products-${{ github.run_id }}
          path: |
            data/episodes/
            data/skipped/
            data/pipeline-state.json
          retention-days: 7
          if-no-files-found: ignore

      - name: 构建站点 + 部署 voice.solomind.cc(有新集且闸门全过,或手动强制)
        if: steps.pipeline.outputs.has_new == 'true' || github.event.inputs.deploy == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # account id 是标识符非机密(单独无用),直接写死省得多配一个 secret
          CLOUDFLARE_ACCOUNT_ID: ac6b3134d98758210ac27d37bd7d5a2d
        run: |
          set -e
          # 0) 确保已发布集都有音频(audio.mp3 gitignore,现场补合成;仅当集有 digest.json)。
          #    修:已提交的干净集(如 Netflix)音频不在仓、rebuildAll 未必重跑 → 部署前统一补,避免 cp 找不到音频。
          for d in data/episodes/*/; do
            [ -d "$d" ] || continue   # 空 glob 保护(与下方 cp 循环一致)
            if [ -f "${d}digest.json" ] && [ ! -f "${d}audio.mp3" ]; then
              echo "补音频:$d"; node scripts/tts.mjs "$d" || echo "::warning::音频合成失败 $d"
            fi
          done
          # 1) bootstrap Quartz v5(钉 commit)+ baseUrl 设 voice.solomind.cc
          # ⚠️ 必须 rm -rf site:流水线步骤 build-list.mjs 默认写 site/content/index.md 会预建出 site/,
          #    若沿用 `[ -d site ] ||` 跳过 clone → 对半拉子 site 执行 checkout 报 "unable to read tree"(C7b 首次部署干净集才暴露)。
          QUARTZ_COMMIT=9cf87ff1c248a8ca551093214b0fec3b31415009
          rm -rf site
          git clone --branch v5 --single-branch https://github.com/jackyzha0/quartz.git site
          git -C site checkout "$QUARTZ_COMMIT"
          cd site
          npm i --no-audit --no-fund
          node ./quartz/bootstrap-cli.mjs create -X new -t default -l shortest -b "voice.solomind.cc"
          node ./quartz/bootstrap-cli.mjs plugin install --from-config --latest
          # C10 配置定制补丁(弹框关/站名/Bases 默认视图;site/ 每次重建,定制必须走这里)
          node ../scripts/patch-site.mjs
          # 2) 灌内容(集页 + 实体页)+ 列表首页
          cp ../samples/*.md content/ 2>/dev/null || true
          if ls ../samples/entities/*.md >/dev/null 2>&1; then
            mkdir -p content/entities && cp ../samples/entities/*.md content/entities/
          fi
          node ../scripts/build-list.mjs
          node ./quartz/bootstrap-cli.mjs build
          # C10 硬断言:首页 Bases 卡片真渲染出来(bases-page 插件 --latest 浮动,类名/属性漂移会静默毁首页;GLM 20260724-014[2])
          grep -q 'bases-card' public/index.html && grep -q 'data-slug=' public/index.html || { echo "::error::首页 Bases 卡片未渲染(插件漂移?),拒绝部署"; exit 1; }
          # 3) 音频进 public/audio(C7a:随 Pages 静态,drift #18;当年手动 cp,此处脚本化)
          mkdir -p public/audio
          for f in ../data/episodes/*/audio.mp3; do
            [ -e "$f" ] || continue   # 空 glob 保护(set -e 下无匹配会把字面量传给 cp 而失败)
            id=$(basename "$(dirname "$f")")
            cp "$f" "public/audio/$id.mp3"
          done
          ls -la public/audio
          # 3.5) 私有播客 feed 随站点部署(drift #29:此步原缺 → feed.xml 不进 public/、
          #      Quartz 只出自家 index.xml,线上 /feed.xml 源头 404、订阅端只剩 CDN 幽灵)。
          #      build-feed ROOT 脚本锚定仓库根,从 site/ 跑仍正确读 samples/ + data/episodes。
          node ../scripts/build-feed.mjs --out public/feed.xml
          # feed 短缓存(drift #29:原遗留 s-maxage=7d 让新集最多 7 天才对播客 App 可见)。
          printf '/feed.xml\n  Cache-Control: public, max-age=3600, must-revalidate\n' > public/_headers
          # 部署前硬断言:feed 真在产物里且有 enclosure(Scenario 5 回归防护,防再次漏 feed 静默上线)。
          feed_n=$(grep -c '<enclosure' public/feed.xml || true)
          echo "public/feed.xml enclosure=$feed_n(public/audio mp3=$(ls public/audio/*.mp3 2>/dev/null | wc -l | tr -d ' '))"
          [ "${feed_n:-0}" -gt 0 ] || { echo "::error::public/feed.xml 无 enclosure,拒绝部署(drift #29 回归:feed 必须随站点上线,不放行只剩 CDN 幽灵的站)"; exit 1; }
          # 4) 部署(CF API token,非交互;项目 voice-solomind)
          npx wrangler pages deploy public --project-name voice-solomind --branch main

      - name: 去重状态 commit 回仓(始终:持久化 cutoff + skipped 账本,防下次重跑重扣钱)
        if: always()
        run: |
          git config user.name "c7b-bot"
          git config user.email "c7b-bot@users.noreply.github.com"
          # data/skipped 是 gitignore 的(不入公开仓);去重靠 pipeline-state.json 的 skipped 账本
          git add data/episodes data/pipeline-state.json samples 2>/dev/null || true
          git commit -m "[C7 🤖] C7b 自动跑批:推进 cutoff + skipped 账本(+干净集若有) (US-4, US-5)" || { echo "无改动可提交"; exit 0; }
          # commit 后清场:add 只收产物三路径,其余 tracked 文件的运行期改动(如 npm install 动 lockfile)
          # 会以 unstaged 状态阻塞 pull --rebase(run 30058134004 实测连败 3 次丢第二批产物的根因)。
          # 产物已全在 commit 里 → reset --hard 只丢「不该回仓的运行期垃圾」,安全。
          git reset --hard HEAD
          # ⚠️ push 失败绝不静默(drift #32 血账:跑批 2h 期间远端被推了 docs → push rejected 被
          #    `|| echo` 吞掉 → 十几集付费产物随 runner 销毁)。修:先 rebase 远端再推,重试 3 次,
          #    仍败响亮 exit 1(产物在丢失边缘,必须人立刻看)。产物路径与 docs/代码天然不相交,rebase 必顺。
          ok=""
          for i in 1 2 3; do
            # -X theirs:产物文件冲突自动取本 run 版(rebase 中 theirs=正在 apply 的 run 产物提交)。
            # run 30073308605 实测:5h 长跑期间 cron 插队回仓 → samples 冲突 → 裸 rebase 三连败丢第三批产物。
            # 产物=确定性重算可再生,run 版最新最全 → 自动取之安全;真代码冲突不会出现在回仓(回仓只提交产物路径)。
            if git pull --rebase -X theirs origin main && git push; then ok=1; break; fi
            git rebase --abort 2>/dev/null || true
            git rebase --abort 2>/dev/null || true   # rebase 半途失败会留 in-progress 态,不清掉重试必撞(GLM 20260724-001[2])
            echo "回仓 push 第 $i 次失败,5s 后重试"; sleep 5
          done
          [ -n "$ok" ] || { echo "::error::回仓 push 连败 3 次——本批付费产物将随 runner 销毁!立刻人工介入(重跑或手动捞产物)"; exit 1; }

      - name: 发布小结(写进 job summary)
        if: always()
        run: |
          {
            echo "## C7b 跑批结果"
            echo "- 有新集:\`${{ steps.pipeline.outputs.has_new }}\`"
            echo "- 有新集→已部署 voice.solomind.cc 并 commit 回仓;无新集→未碰线上。"
            echo "- 失败时 GitHub 会自动给仓库 owner 发邮件(原生告警)。"
          } >> "$GITHUB_STEP_SUMMARY"
